<section id="call-section" class="call-section">
  @if (i18n.currentLang()) {
    <h1 class="call-section__title">{{ 'APP_TITLE' | translate }}</h1>
    <a mat-raised-button color="primary" class="call-section__btn" [href]="'tel:' + phoneNumber()">
      <mat-icon class="call-section__icon">phone</mat-icon>
      {{ 'CTA_CALL' | translate }}
    </a>
    <p class="call-section__text">
      {{ 'CALL_SECTION_TEXT' | translate }}
    </p>
  }
</section>
